<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | PUSHEEN S.A.S</title>

<link rel="icon" type="image/png" href="img/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#2c3e50,#4ca1af);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-card{
width:100%;
max-width:400px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
width:70px;
}

</style>

</head>

<body>

<div class="card login-card p-4">

<div class="text-center mb-3">
<img src="img/logo.png" class="logo">
<h4 class="mt-2 fw-bold">PUSHEEN S.A.S</h4>
<p class="text-muted small">Acceso al sistema</p>
</div>

<form onsubmit="login(event)">

<div class="mb-3">
<label class="form-label">Usuario</label>
<input type="text" id="user" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" id="pass" class="form-control" required>
</div>

<div id="error" class="text-danger small mb-2"></div>

<button class="btn btn-dark w-100">
Ingresar
</button>

</form>

</div>

<script>

function login(e){

e.preventDefault()

let usuario = document.getElementById("user").value
let password = document.getElementById("pass").value

if(usuario === "admin" && password === "1234"){

window.location.href = "home.html"

}else{

document.getElementById("error").innerText = "Usuario o contraseña incorrectos"

}

}

</script>

</body>
</html>
